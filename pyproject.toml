[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sre"
version = "0.1.0"
description = "Sovereign Reconstruction Engine — constitutional evidence-constrained linguistic reconstruction"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Constitutional Computing License v1.0 (placeholder)" }
authors = [{ name = "HYFAL / SRE" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.6"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]
